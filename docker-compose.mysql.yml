services:
  mysql:
    image: mysql:8.4
    container_name: trimnexa-mysql
    restart: unless-stopped
    ports:
      - '3308:3306'
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-trimnexa_dev_root}
      MYSQL_DATABASE: trimnexa
      MYSQL_USER: ${MYSQL_USER:-trimnexa}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-trimnexa_dev}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - trimnexa_mysql_data:/var/lib/mysql
    healthcheck:
      test:
        [
          'CMD',
          'mysqladmin',
          'ping',
          '-h',
          '127.0.0.1',
          '-uroot',
          '-p${MYSQL_ROOT_PASSWORD:-trimnexa_dev_root}',
        ]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  trimnexa_mysql_data:
